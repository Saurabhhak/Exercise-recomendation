<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication</title>
    <link rel="stylesheet" href="/static/sign.css">
</head>
<body>
    <div class="auth-container">
        <!-- Signup Form -->
        <div class="form-wrapper" id="signup-form">
            <h2>Sign Up</h2>
            <form action="/sign" method="POST">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Sign Up</button>
                <p>Already have an account? <a href="#" onclick="toggleForms()">Log In</a></p>
            </form>
        </div>
        <!-- Login Form -->
        <div class="form-wrapper" id="login-form" style="display: none;">
            <h2>Login</h2>
            <form action="/login" method="POST">
                <label for="email">Email</label>
                <input type="email" id="login-email" name="email" required>
                
                <label for="password">Password</label>
                <input type="password" id="login-password" name="password" required>

                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" onclick="toggleForms()">Sign Up</a></p>
            </form>
        </div>
    </div>
    <script>
        function toggleForms() {
            document.getElementById("signup-form").style.display = 
                document.getElementById("signup-form").style.display === "none" ? "block" : "none";
            document.getElementById("login-form").style.display = 
                document.getElementById("login-form").style.display === "none" ? "block" : "none";
        }
    </script>
</body>
</html>
